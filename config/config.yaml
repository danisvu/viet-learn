ollama:
  base_url: http://localhost:11434
  model: qwen3:8b
  timeout: 60

translator:
  max_retries: 3
  retry_delay: 1.0
  batch_delay: 0.1

tts:
  model: vi_VN-vais1000-medium
  model_path: piper_models/vi/vi_VN/vais1000/medium/vi_VN-vais1000-medium.onnx
  speed: 1.0

audio:
  original_volume: 0.15
  vi_volume: 1.0

time_stretch:
  max_speed_ratio: 1.6
  min_speed_ratio: 0.75

app:
  language: vi
  log_level: INFO

udemy:
  output_dir: output/udemy
  browser: chrome

whisper:
  model: large-v3-turbo
  model_dir: whisper_models
  n_threads: 4
  language: en
  output_dir: output/stt

capture:
  output_dir: output/captures
  device_name: "BlackHole 2ch"
  sample_rate: 44100
  channels: 2
  chunk_size: 1024

imports:
  output_dir: output/imports

download:
  output_dir: output/downloads
  format: "bestvideo[ext=mp4]+bestaudio[ext=m4a]/mp4"
  subtitle_langs:
    - en
  subtitle_format: srt
  quiet: true
  no_warnings: true
